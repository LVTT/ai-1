# 任务级 Prompt 模板库
# 适用于具体任务的 Prompt 模板

summarize:
  name: 文本摘要
  description: 对长文本进行摘要
  prompt: |
    请对以下文本进行摘要。
    要求：
    - 保留核心观点和关键数据
    - 字数控制在原文的 20% 以内
    - 使用客观中立的语气

    原文：
    {text}

    摘要：

extract:
  name: 信息抽取
  description: 从文本中提取结构化信息
  prompt: |
    请从以下文本中提取指定信息，以 JSON 格式输出。
    需要提取的字段：{fields}

    文本：
    {text}

    输出格式示例：
    {{
      "字段1": "值1",
      "字段2": "值2"
    }}

classify:
  name: 文本分类
  description: 对文本进行分类
  prompt: |
    请将以下文本分类到最合适的类别中。
    可选类别：{categories}

    文本：
    {text}

    请只输出类别名称，不要解释。

compare:
  name: 对比分析
  description: 对比两个或多个对象
  prompt: |
    请对以下内容进行对比分析。
    对比对象：{items}

    请从以下维度进行对比：{dimensions}

    输出格式：
    | 维度 | {item_names} |
    |---|---|
    | ... | ... |

    总结：

qa:
  name: 问答生成
  description: 基于文本生成问答对
  prompt: |
    请基于以下文本生成 {num_questions} 个高质量的问答对。
    要求：
    - 问题应覆盖文本的不同方面
    - 答案应直接从文本中可找到
    - 包含事实性问题和推理性问题

    文本：
    {text}

    问答对：
    Q1: ...
    A1: ...

rewrite:
  name: 文本改写
  description: 以不同风格改写文本
  prompt: |
    请将以下文本改写为 {style} 风格。
    原文：
    {text}

    改写后的文本：

intent:
  name: 意图识别
  description: 分析用户请求，判断其意图类型
  prompt: |
    分析用户请求，判断其意图类型。只输出意图类型，不要解释。

    可选意图：
    - knowledge: 需要查询已有知识库（如"什么是XXX？"、"解释一下YYY的概念"）
    - tool: 需要获取实时信息或执行操作（如"今天天气"、"搜索"、"计算"）
    - creative: 创意生成任务（如"写一首诗"、"生成文案"）
    - analysis: 分析评估任务（如"分析优缺点"、"比较A和B"）
    - general: 其他一般性问答

    用户请求：{query}

    意图类型：

planning:
  name: 任务规划
  description: 将用户请求分解为可执行步骤
  prompt: |
    你是一个任务规划专家。请将用户的请求分解为具体的执行步骤。

    可用的工具：
    {tools_description}

    请按以下 JSON 格式输出计划：
    {{
      "reasoning": "对任务的分析和规划思路",
      "steps": [
        {{
          "step_number": 1,
          "description": "步骤描述",
          "tool": "工具名称（如不需要工具则填 null）",
          "tool_input": "工具的输入参数"
        }}
      ]
    }}

    注意：
    1. 每个步骤应该明确、可执行
    2. 优先使用工具获取实时信息
    3. 如果任务简单，可以只有一步
    4. 最后一步应该是综合所有信息给出最终回答

    用户请求：{query}

    请输出计划（只输出 JSON，不要其他内容）：
